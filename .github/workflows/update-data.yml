name: Update Drive Data

on:
  workflow_dispatch:
    inputs:
      donations_current:
        description: 'Donations raised so far ($) — leave blank to keep current'
        required: false
        type: number
      donations_goal:
        description: 'Donations goal ($) — leave blank to keep current'
        required: false
        type: number
      members_current:
        description: 'Current member count — leave blank to keep current'
        required: false
        type: number
      members_goal:
        description: 'Member goal — leave blank to keep current'
        required: false
        type: number

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show current values
        run: |
          python3 - <<'EOF'
          import json

          with open('data.json') as f:
              data = json.load(f)

          d = data['donations']
          m = data['members']

          summary = f"""## Current values (before this run)

          | Field | Value |
          |-------|-------|
          | Donations current | ${d['current']:,} |
          | Donations goal    | ${d['goal']:,} |
          | Members current   | {m['current']} |
          | Members goal      | {m['goal']} |

          ## Instructions

          - Only fill in the fields you want to change — blank fields keep their current value.
          - The display at https://fubarlabs.github.io/fubar_drive_monitor/display.html
            updates within 60 seconds of this workflow completing.
          - To check current values before running, look at the summary from the last run.
          """

          import textwrap
          with open('/tmp/summary.md', 'w') as f:
              f.write(textwrap.dedent(summary))
          EOF
          cat /tmp/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Update data.json
        env:
          DONATIONS_CURRENT: ${{ inputs.donations_current }}
          DONATIONS_GOAL: ${{ inputs.donations_goal }}
          MEMBERS_CURRENT: ${{ inputs.members_current }}
          MEMBERS_GOAL: ${{ inputs.members_goal }}
        run: |
          python3 - <<'EOF'
          import json, os

          with open('data.json') as f:
              data = json.load(f)

          before = json.dumps(data, indent=2)

          for key, field in [
              ('DONATIONS_CURRENT', ('donations', 'current')),
              ('DONATIONS_GOAL',    ('donations', 'goal')),
              ('MEMBERS_CURRENT',   ('members',   'current')),
              ('MEMBERS_GOAL',      ('members',   'goal')),
          ]:
              val = os.environ.get(key, '').strip()
              if val:
                  data[field[0]][field[1]] = int(val)

          with open('data.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')

          d = data['donations']
          m = data['members']

          result = f"""## Updated values

          | Field | Value |
          |-------|-------|
          | Donations current | ${d['current']:,} |
          | Donations goal    | ${d['goal']:,} |
          | Members current   | {m['current']} |
          | Members goal      | {m['goal']} |
          """

          import textwrap
          with open('/tmp/result.md', 'w') as f:
              f.write(textwrap.dedent(result))
          EOF
          cat /tmp/result.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet && echo "No changes" || git commit -m "chore: update drive data [skip ci]"
          git push
