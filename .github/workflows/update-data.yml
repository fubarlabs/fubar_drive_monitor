name: Update Drive Data

on:
  workflow_dispatch:
    inputs:
      donations_current:
        description: 'Donations raised so far ($)'
        required: true
        type: number
      donations_goal:
        description: 'Donations goal ($)'
        required: false
        type: number
      members_current:
        description: 'Current member count'
        required: true
        type: number
      members_goal:
        description: 'Member goal'
        required: false
        type: number

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update data.json
        env:
          DONATIONS_CURRENT: ${{ inputs.donations_current }}
          DONATIONS_GOAL: ${{ inputs.donations_goal }}
          MEMBERS_CURRENT: ${{ inputs.members_current }}
          MEMBERS_GOAL: ${{ inputs.members_goal }}
        run: |
          python3 - <<'EOF'
          import json, os

          with open('data.json') as f:
              data = json.load(f)

          data['donations']['current'] = int(os.environ['DONATIONS_CURRENT'])
          data['members']['current']   = int(os.environ['MEMBERS_CURRENT'])

          goal_d = os.environ.get('DONATIONS_GOAL', '').strip()
          goal_m = os.environ.get('MEMBERS_GOAL', '').strip()

          if goal_d:
              data['donations']['goal'] = int(goal_d)
          if goal_m:
              data['members']['goal'] = int(goal_m)

          with open('data.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')

          print(json.dumps(data, indent=2))
          EOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet && echo "No changes" || git commit -m "chore: update drive data [skip ci]"
          git push
